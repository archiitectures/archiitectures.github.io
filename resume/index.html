<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume — Architesh Prasad</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="resume-page">
    <a href="resume.pdf" download class="resume-download" aria-label="Download Resume">
      <svg class="dl-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line class="dl-shaft" x1="12" y1="3" x2="12" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <polyline class="dl-arrow" points="7,11 12,16 17,11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="dl-ring" cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </a>
    <iframe src="resume.pdf#toolbar=0&navpanes=0&scrollbar=0" class="resume-frame"></iframe>
  </div>
</body>
</html>
